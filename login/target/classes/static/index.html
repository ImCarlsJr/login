<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Auth Logs</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#0f172a;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width:400px;
            background:white;
            border-radius:15px;
            padding:30px;
            box-shadow:0 0 25px rgba(0,0,0,0.3);
        }

        h1{
            text-align:center;
            margin-bottom:20px;
            color:#0f172a;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:10px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:15px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:15px;
            border:none;
            border-radius:8px;
            background:#2563eb;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#1d4ed8;
        }

        .mensaje{
            margin-top:15px;
            text-align:center;
            font-weight:bold;
        }

        .seccion{
            margin-top:25px;
        }

    </style>
</head>
<body>

<div class="container">

    <h1>Sistema Auth</h1>

    <!-- REGISTRO -->
    <div class="seccion">

        <h3>Registro</h3>

        <input type="text" id="regUsername" placeholder="Username">

        <input type="email" id="regEmail" placeholder="Correo">

        <input type="password" id="regPassword" placeholder="Contraseña">

        <button onclick="registrar()">
            Registrarse
        </button>

    </div>

    <!-- LOGIN -->
    <div class="seccion">

        <h3>Login</h3>

        <input type="text" id="loginUsername" placeholder="Username">

        <input type="password" id="loginPassword" placeholder="Contraseña">

        <button onclick="login()">
            Iniciar Sesión
        </button>

    </div>

    <div class="mensaje" id="mensaje"></div>

</div>

<script>

    const API =
        "http://localhost:8080/api/auth";

    async function registrar(){

        const username =
            document.getElementById("regUsername").value;

        const email =
            document.getElementById("regEmail").value;

        const password =
            document.getElementById("regPassword").value;

        const response = await fetch(
            API + "/registro",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    username,
                    email,
                    password
                })
            }
        );

        const data = await response.json();

        document.getElementById("mensaje")
            .innerText =
            data.message || data.error;
    }

    async function login(){

        const username =
            document.getElementById("loginUsername").value;

        const password =
            document.getElementById("loginPassword").value;

        const response = await fetch(
            API + "/login",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    username,
                    password
                })
            }
        );

        const data = await response.json();

        document.getElementById("mensaje")
            .innerText =
            data.message || data.error;
    }

</script>

</body>
</html>
